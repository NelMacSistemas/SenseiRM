
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseiRM - CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // VISIBLE ERROR REPORTER
        window.onerror = function(msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style = "position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:99999;font-family:monospace;font-size:12px;max-height:150px;overflow:auto;border-bottom:3px solid black;";
            div.innerText = "CRASH DETECTED: " + msg + " (L" + line + ":" + col + ")\n" + (error ? error.stack : "");
            document.body.appendChild(div);
            return false;
        };
        window.onunhandledrejection = function(event) {
            const div = document.createElement('div');
            div.style = "position:fixed;bottom:0;left:0;right:0;background:darkred;color:white;padding:10px;z-index:99999;font-family:monospace;font-size:12px;";
            div.innerText = "PROMISE REJECTION: " + event.reason;
            document.body.appendChild(div);
        };
        console.log("Diagnostic mode active.");
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
